services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__Provider: Postgres
      Database__ConnectionString: Host=postgres;Port=5432;Database=orders_demo;Username=postgres;Password=postgres
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data:
